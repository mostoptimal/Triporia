        rel="stylesheet">
    <script src="https://kit.fontawesome.com/1780cc454e.js" crossorigin="anonymous"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-app: #0d0d0f;
            --bg-elevated: #18181b;
            --bg-subtle: #1f1f23;
            --bg-hover: #27272a;
            --bg-active: #323238;
            --border-subtle: #27272a;
            --border-default: #3f3f46;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #22d3ee;
            --accent-muted: #0891b2;
            --accent-subtle: rgba(34, 211, 238, 0.1);
            --accent-glow: rgba(34, 211, 238, 0.4);
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px var(--accent-subtle);
        }

        [data-theme="light"] {
            --bg-app: #fafafa;
            --bg-elevated: #ffffff;
            --bg-subtle: #f4f4f5;
            --bg-hover: #e4e4e7;
            --bg-active: #d4d4d8;
            --border-subtle: #e4e4e7;
            --border-default: #d4d4d8;
            --text-primary: #18181b;
            --text-secondary: #52525b;
            --text-muted: #a1a1aa;
            --accent: #0891b2;
            --accent-muted: #0e7490;
            --accent-subtle: rgba(8, 145, 178, 0.1);
            --accent-glow: rgba(8, 145, 178, 0.2);
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-glow: 0 0 20px var(--accent-subtle);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-app);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            min-height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }

        .main-panel {
            padding: 32px 40px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .sidebar {
            background: var(--bg-elevated);
            border-left: 1px solid var(--border-subtle);
            padding: 24px;
            overflow-y: auto;
            max-height: 100vh;
            position: sticky;
            top: 0;
        }

        @media (max-width: 1100px) {
            .app-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-left: none;
                border-top: 1px solid var(--border-subtle);
                position: relative;
                max-height: none;
            }

            .main-panel {
                padding: 24px;
                max-height: none;
            }
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--accent);
            color: var(--bg-app);
            padding: 8px 16px;
            z-index: 1000;
            text-decoration: none;
            border-radius: 0 0 var(--radius-sm) 0;
            font-weight: 600;
            font-size: 14px;
        }

        .skip-link:focus {
            top: 0;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent-muted));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow-glow);
        }

        .brand-text h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .brand-text p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg-subtle);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .stat-pill:hover {
            background: var(--bg-hover);
            border-color: var(--border-default);
        }

        .stat-pill i {
            color: var(--accent);
        }

        .stat-pill strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            background: var(--bg-subtle);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--bg-hover);
            color: var(--accent);
            transform: rotate(15deg);
        }

        .search-section {
            margin-bottom: 28px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .search-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .region-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .region-btn {
            padding: 8px 16px;
            background: var(--bg-subtle);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .region-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-default);
        }

        .region-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-app);
        }

        .countries-section {
            margin-bottom: 32px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .countries-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .country-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .country-chip:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-default);
            transform: translateY(-1px);
        }

        .country-chip.active {
            background: var(--accent-subtle);
            border-color: var(--accent);
            color: var(--accent);
        }

        .country-chip .flag {
            font-size: 16px;
            line-height: 1;
        }

        .content-panel {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .country-hero {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .country-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .country-flag {
            font-size: 40px;
            line-height: 1;
        }

        .country-info h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .country-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .meta-tag i {
            font-size: 12px;
        }

        .live-clock-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--accent-subtle);
            border: 1px solid var(--accent);
            border-radius: var(--radius-lg);
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 500;
            color: var(--accent);
        }

        .live-clock-badge i {
            font-size: 14px;
        }

        .live-clock-badge .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .info-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        @media (max-width: 768px) {
            .info-cards {
                grid-template-columns: 1fr;
            }
        }

        .info-card {
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
        }

        .info-card.tips {
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.08), rgba(52, 211, 153, 0.02));
            border-color: rgba(52, 211, 153, 0.2);
        }

        .info-card.keep-in-mind {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.08), rgba(251, 191, 36, 0.02));
            border-color: rgba(251, 191, 36, 0.2);
        }

        .info-card h3 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card.tips h3 {
            color: var(--success);
        }

        .info-card.keep-in-mind h3 {
            color: var(--warning);
        }

        .info-card ul {
            list-style: none;
        }

        .info-card li {
            font-size: 14px;
            color: var(--text-secondary);
            padding: 8px 0;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }

        .info-card li:last-child {
            border-bottom: none;
        }

        .info-card.tips li i {
            color: var(--success);
            margin-top: 2px;
        }

        .info-card.keep-in-mind li i {
            color: var(--warning);
            margin-top: 2px;
        }

        .useful-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-subtle);
            border-radius: var(--radius-lg);
            margin-bottom: 28px;
        }

        .useful-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .useful-item i {
            width: 20px;
            color: var(--text-muted);
        }

        .useful-item span {
            color: var(--text-primary);
            font-weight: 500;
        }

        .apps-section {
            margin-bottom: 32px;
        }

        .apps-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .apps-section h3 i {
            color: var(--accent);
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
        }

        @media (max-width: 600px) {
            .apps-grid {
                grid-template-columns: 1fr;
            }
        }

        .app-card {
            display: block;
            padding: 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .app-card:hover {
            background: var(--bg-hover);
            border-color: var(--border-default);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .app-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .app-logo {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            object-fit: contain;
            background: var(--bg-subtle);
            padding: 6px;
        }

        .app-name {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .app-badge {
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .app-badge.web {
            background: var(--accent-subtle);
            color: var(--accent);
        }

        .app-badge.app {
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
        }

        .app-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .app-tip {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
        }

        .app-tip i {
            color: var(--accent);
            margin-top: 1px;
            flex-shrink: 0;
        }

        .no-data {
            font-size: 14px;
            color: var(--text-muted);
            font-style: italic;
            padding: 20px;
            text-align: center;
            background: var(--bg-subtle);
            border-radius: var(--radius-lg);
        }

        /* Sidebar - Travel Checklist */
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h2 i {
            color: var(--accent);
        }

        .progress-badge {
            padding: 6px 12px;
            background: var(--accent-subtle);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        .todo-category {
            margin-bottom: 20px;
        }

        .todo-category-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .todo-category-title i {
            font-size: 12px;
            color: var(--accent);
        }

        .todo-items {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-subtle);
            border-radius: var(--radius-md);
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .todo-item:hover {
            background: var(--bg-hover);
        }

        .todo-item.checked {
            opacity: 0.5;
        }

        .todo-item.checked .todo-text {
            text-decoration: line-through;
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid var(--border-default);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .todo-checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .todo-checkbox.checked i {
            color: var(--bg-app);
            font-size: 10px;
        }

        .todo-text {
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.15s ease;
        }

        .todo-item:hover .todo-text {
            color: var(--text-primary);
        }

        .add-todo-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .add-todo-section h4 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .todo-category-select {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-subtle);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            margin-bottom: 10px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        .todo-category-select:focus {
            border-color: var(--accent);
        }

        .add-todo-form {
            display: flex;
            gap: 8px;
        }

        .add-todo-input {
            flex: 1;
            padding: 12px 14px;
            background: var(--bg-subtle);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .add-todo-input::placeholder {
            color: var(--text-muted);
        }

        .add-todo-input:focus {
            border-color: var(--accent);
        }

        .add-todo-btn {
            padding: 12px 16px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-md);
            color: var(--bg-app);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-todo-btn:hover {
            background: var(--accent-muted);
            transform: scale(1.02);
        }

        /* Back to top */
        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
            color: var(--bg-app);
            font-size: 18px;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
        }

        /* Footer in main panel */
        .main-footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .main-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .main-footer a:hover {
            color: var(--text-primary);
        }

        .footer-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        /* Loading state */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading i {
            font-size: 32px;
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .loading p {
            font-size: 14px;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .main-panel {
                padding: 20px 16px;
            }

            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .top-actions {
                width: 100%;
                justify-content: space-between;
            }

            .country-hero {
                flex-direction: column;
            }

            .country-info h2 {
                font-size: 22px;
            }

            .country-flag {
                font-size: 32px;
            }

            .apps-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Mobile sidebar toggle */
        .mobile-sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: var(--bg-app);
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            z-index: 99;
        }

        @media (max-width: 1100px) {
            .mobile-sidebar-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 70vh;
                border-radius: var(--radius-xl) var(--radius-xl) 0 0;
                transform: translateY(100%);
                transition: transform 0.3s ease;
                z-index: 98;
            }

            .sidebar.open {
                transform: translateY(0);
            }

            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
                z-index: 97;
            }

            .sidebar-overlay.open {
                opacity: 1;
                visibility: visible;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-subtle);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-default);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

            initTheme();

                electronics: 'fa-mobile-alt',
                clothing: 'fa-tshirt',
                health: 'fa-pills',

            function loadTodos() {
                try {

                    return JSON.parse(JSON.stringify(defaultTodos));
                }
            }

            function saveTodos(todos) {
                try {
                    localStorage.setItem('triporiaTodos', JSON.stringify(todos));
                } catch (e) { }
            }

            let todos = loadTodos();

            function renderTodos() {
                const container = document.getElementById('todoListContainer');
                let html = '';
                let total = 0;
                let checked = 0;

                for (const [category, items] of Object.entries(todos)) {
                    total += items.length;
                    const checkedCount = items.filter(i => i.checked).length;
                    checked += checkedCount;

                    html += `
                        <div class="todo-category">
                            <div class="todo-category-title">
                                <i class="fas ${categoryIcons[category]}"></i>
                                ${category.charAt(0).toUpperCase() + category.slice(1)} (${checkedCount}/${items.length})
                            </div>
                            <ul class="todo-items">

                                            ${item.checked ? '<i class="fas fa-check"></i>' : ''}
                                        </div>

                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }

                container.innerHTML = html;
                document.getElementById('todoProgress').textContent = `${checked}/${total}`;

                container.querySelectorAll('.todo-item').forEach(item => {

                        checkbox.classList.toggle('checked');
                        if (checkbox.classList.contains('checked')) {
                            checkbox.innerHTML = '<i class="fas fa-check"></i>';
                        } else {
                            checkbox.innerHTML = '';
                        }
                        const cat = item.dataset.category;
                        const idx = parseInt(item.dataset.index);
                        todos[cat][idx].checked = checkbox.classList.contains('checked');
                        saveTodos(todos);
                        renderTodos();
                    });
                });
            }

                const input = document.getElementById('todoNewItem');
                const category = document.getElementById('todoCategorySelect').value;
                const text = input.value.trim();
                if (text) {
                    todos[category].push({ text: text, checked: false });
                    saveTodos(todos);
                    renderTodos();
                    input.value = '';
                }
            });

                        <ul>${d.tips.map(t => `<li><i class="fas fa-lightbulb"></i> ${t}</li>`).join('')}</ul>
                    </div>
                    <div class="info-card keep-in-mind">
                        <h3><i class="fas fa-shield-halved"></i> Keep in mind</h3>
                        <ul>${d.disclaimers.map(t => `<li><i class="fas fa-exclamation-triangle"></i> ${t}</li>`).join('')}</ul>
                    </div>
                </div>
                ${internationalAppsHtml}
            `;
                document.getElementById('contentPanel').innerHTML = finalHtml;
            }

            function getInternationalAppsHtml() {
                const internationalApps = [
                    { name: 'Google Maps', url: 'https://www.google.com/maps', desc: 'Offline maps, directions, traffic', tip: 'Download offline maps before going offline', type: 'web' },
                    { name: 'WhatsApp', url: 'https://www.whatsapp.com', desc: 'Messaging, calls, voice notes', tip: 'Works internationally with WiFi', type: 'app' },
                    { name: 'Skyscanner', url: 'https://www.skyscanner.com', desc: 'Compare flight prices', tip: 'Best for finding cheapest flights', type: 'web' },
                    { name: 'Booking.com', url: 'https://www.booking.com', desc: 'Hotels & accommodation', tip: 'Free cancellation on most bookings', type: 'web' },
                    { name: 'Airbnb', url: 'https://www.airbnb.com', desc: 'Unique stays & experiences', tip: 'Check cancellation policy', type: 'web' },
                    { name: 'Uber', url: 'https://www.uber.com', desc: 'Ride-hailing in 70+ countries', tip: 'Works in most major cities', type: 'app' },
                    { name: 'GetYourGuide', url: 'https://www.getyourguide.com', desc: 'Tours & attractions', tip: 'Skip-the-line tickets', type: 'web' },
                    { name: 'Klook', url: 'https://www.klook.com', desc: 'Activities & transport tickets', tip: 'Great for Asia & beyond', type: 'web' },
                    { name: 'Google Translate', url: 'https://www.translate.google.com', desc: 'Translate text, voice, camera', tip: 'Download languages offline', type: 'app' },
                    { name: 'XE Currency', url: 'https://www.xe.com', desc: 'Currency converter', tip: 'Free rates, works offline', type: 'app' },
                    { name: 'World Time Buddy', url: 'https://www.worldtimebuddy.com', desc: 'Time zone converter', tip: 'Plan calls across time zones', type: 'web' },
                    { name: 'Wise', url: 'https://www.wise.com', desc: 'Multi-currency account & transfers', tip: 'Better exchange rates than banks', type: 'web' },
                    { name: 'Revolut', url: 'https://www.revolut.com', desc: 'Multi-currency card', tip: 'Spend abroad with no fees', type: 'app' },
                    { name: 'TripAdvisor', url: 'https://www.tripadvisor.com', desc: 'Reviews & recommendations', tip: 'Check reviews before booking', type: 'web' },
                    { name: 'Lonely Planet', url: 'https://www.lonelyplanet.com', desc: 'Travel guides & eBooks', tip: 'In-depth destination info', type: 'web' },
                    { name: 'Duolingo', url: 'https://www.duolingo.com', desc: 'Learn basic phrases', tip: 'Quick language basics before trip', type: 'app' },
                    { name: 'AllTrails', url: 'https://www.alltrails.com', desc: 'Hiking & trail maps', tip: 'Download trails offline', type: 'web' },
                    { name: 'Google Flights', url: 'https://www.google.com/travel/flights', desc: 'Flight search & deals', tip: 'Track prices for best timing', type: 'web' },
                    { name: 'Hostelworld', url: 'https://www.hostelworld.com', desc: 'Hostels & budget stays', tip: 'Best for backpackers', type: 'web' },
                    { name: 'Rome2Rio', url: 'https://www.rome2rio.com', desc: 'Multi-modal transport search', tip: 'Compare flights, trains, buses', type: 'web' }
                ];

                const cardsHtml = internationalApps.map(app => {
                    const logo = getAppLogo(app.name);
                    const badgeClass = app.type === 'app' ? 'app' : 'web';
                    return `
                    <a href="${app.url}" target="_blank" rel="noopener noreferrer" class="app-card">
                        <div class="app-card-header">
                            ${logo ? `<img src="${logo}" alt="${app.name}" class="app-logo" crossorigin="anonymous" onerror="this.style.display='none'">` : ''}
                            <span class="app-name">${app.name}</span>
                            <span class="app-badge ${badgeClass}">${app.type === 'app' ? 'App' : 'Web'}</span>
                        </div>
                        <div class="app-desc">${app.desc}</div>
                        <div class="app-tip"><i class="fas fa-sparkles"></i> ${app.tip}</div>
                    </a>
                `;
                }).join('');

                return `
                <div class="apps-section">
                    <h3><i class="fas fa-globe"></i> International apps (works worldwide)</h3>
                    <div class="apps-grid">
                        ${cardsHtml}
                    </div>
                </div>
            `;
            }

            function renderCountryPills(filteredKeys = null) {
                const container = document.getElementById('countriesGrid');
                container.innerHTML = '';
                const keysToRender = filteredKeys || countryKeys;

                keysToRender.forEach(k => {
                    const c = countriesData[k];
                    if (!c) return;

                    if (currentRegion !== 'all' && c.region !== currentRegion) return;

                    const chip = document.createElement('button');
                    chip.className = 'country-chip';
                    chip.setAttribute('data-key', k);
                    chip.setAttribute('role', 'option');
                    chip.innerHTML = `<span class="flag">${c.flag}</span> ${c.name}`;
                    chip.addEventListener('click', () => {
                        document.querySelectorAll('.country-chip').forEach(p => p.classList.remove('active'));
                        chip.classList.add('active');
                        renderCountry(k);
                    });

                    container.appendChild(chip);
                });

                if (container.children.length === 0) {
                    container.innerHTML = '<div class="no-data">No countries found</div>';
                }
            }

            function filterCountries() {
                if (!searchQuery) {
                    renderCountryPills();
                    return;
                }
                const filtered = countryKeys.filter(k => {
                    const c = countriesData[k];
                    return c && c.name.toLowerCase().includes(searchQuery);
                });
                renderCountryPills(filtered);
            }

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                filterCountries();
            });

            function init() {
                let initialCountry = null;

                const hash = window.location.hash.slice(1);
                if (hash && countriesData[hash]) {
                    initialCountry = hash;
                }

                if (!initialCountry) {
                    try {
                        const saved = localStorage.getItem('lastCountry');
                        if (saved && countriesData[saved]) {
                            initialCountry = saved;
                        }
                    } catch (e) { }
                }

                if (!initialCountry) {
                    initialCountry = countryKeys[0];
                }

                renderCountryPills();

                setTimeout(() => {
                    const chip = document.querySelector(`[data-key="${initialCountry}"]`);
                    if (chip) {
                        chip.classList.add('active');
                    }
                    renderCountry(initialCountry);
                }, 0);
            }

            window.addEventListener('popstate', () => {
                const hash = window.location.hash.slice(1);
                if (hash && countriesData[hash]) {
                    document.querySelectorAll('.country-chip').forEach(p => p.classList.remove('active'));
                    const chip = document.querySelector(`[data-key="${hash}"]`);
                    if (chip) chip.classList.add('active');
                    renderCountry(hash);
                }
            });

            const mobileSidebar = document.getElementById('sidebar');
            const mobileToggle = document.getElementById('mobileSidebarToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            if (mobileToggle && mobileSidebar) {
                mobileToggle.addEventListener('click', () => {
                    mobileSidebar.classList.toggle('open');
                    sidebarOverlay.classList.toggle('open');
                });

                sidebarOverlay.addEventListener('click', () => {
                    mobileSidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('open');
                });
            }

            init();
        })();
    </script>
</body>

</html>
