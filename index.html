            function loadTodos() {
                try {
                    const saved = localStorage.getItem('triporiaTodos');
                    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultTodos));
                } catch (e) {
                    return JSON.parse(JSON.stringify(defaultTodos));
                }
            }

            function saveTodos(todos) {
                try {
                    localStorage.setItem('triporiaTodos', JSON.stringify(todos));
                } catch (e) { }
            }

            let todos = loadTodos();

            function renderTodos() {
                const container = document.getElementById('todoListContainer');
                let html = '';
                let total = 0;
                let checked = 0;

                for (const [category, items] of Object.entries(todos)) {
                    total += items.length;
                    const checkedCount = items.filter(i => i.checked).length;
                    checked += checkedCount;

                    html += `
                        <div class="todo-category">
                            <div class="todo-category-title">
                                <i class="fas ${categoryIcons[category]}"></i>
                                ${category.charAt(0).toUpperCase() + category.slice(1)} (${checkedCount}/${items.length})
                            </div>
                            <ul class="todo-items">
                                ${items.map((item, idx) => `
                                    <li class="todo-item ${item.checked ? 'checked' : ''}" data-category="${category}" data-index="${idx}">
                                        <input type="checkbox" ${item.checked ? 'checked' : ''}>
                                        <span class="todo-item-text">${item.text}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }

                container.innerHTML = html;
                document.getElementById('todoProgress').textContent = `${checked}/${total}`;

                container.querySelectorAll('.todo-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        if (e.target.type !== 'checkbox') {
                            const checkbox = item.querySelector('input');
                            checkbox.checked = !checkbox.checked;
                        }
                        const cat = item.dataset.category;
                        const idx = parseInt(item.dataset.index);
                        todos[cat][idx].checked = item.querySelector('input').checked;
                        saveTodos(todos);
                        renderTodos();
                    });

                    item.querySelector('input').addEventListener('change', () => {
                        const cat = item.dataset.category;
                        const idx = parseInt(item.dataset.index);
                        todos[cat][idx].checked = item.querySelector('input').checked;
                        saveTodos(todos);
                        renderTodos();
                    });
                });
            }

            document.getElementById('todoAddBtn').addEventListener('click', () => {
                const input = document.getElementById('todoNewItem');
                const category = document.getElementById('todoCategorySelect').value;
                const text = input.value.trim();
                if (text) {
                    todos[category].push({ text: text, checked: false });
                    saveTodos(todos);
                    renderTodos();
                    input.value = '';
                }
            });

            document.getElementById('todoNewItem').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('todoAddBtn').click();

            }

            // Get International Apps HTML
            function getInternationalAppsHtml() {
                const internationalApps = [
                    { name: 'Google Maps', url: 'https://www.google.com/maps', desc: 'Offline maps, directions, traffic', tip: 'Download offline maps before going offline', type: 'web' },
                    { name: 'WhatsApp', url: 'https://www.whatsapp.com', desc: 'Messaging, calls, voice notes', tip: 'Works internationally with WiFi', type: 'app' },
                    { name: 'Skyscanner', url: 'https://www.skyscanner.com', desc: 'Compare flight prices', tip: 'Best for finding cheapest flights', type: 'web' },
                    { name: 'Booking.com', url: 'https://www.booking.com', desc: 'Hotels & accommodation', tip: 'Free cancellation on most bookings', type: 'web' },
                    { name: 'Airbnb', url: 'https://www.airbnb.com', desc: 'Unique stays & experiences', tip: 'Check cancellation policy', type: 'web' },
                    { name: 'Uber', url: 'https://www.uber.com', desc: 'Ride-hailing in 70+ countries', tip: 'Works in most major cities', type: 'app' },
                    { name: 'GetYourGuide', url: 'https://www.getyourguide.com', desc: 'Tours & attractions', tip: 'Skip-the-line tickets', type: 'web' },
                    { name: 'Klook', url: 'https://www.klook.com', desc: 'Activities & transport tickets', tip: 'Great for Asia & beyond', type: 'web' },
                    { name: 'Google Translate', url: 'https://www.translate.google.com', desc: 'Translate text, voice, camera', tip: 'Download languages offline', type: 'app' },
                    { name: 'XE Currency', url: 'https://www.xe.com', desc: 'Currency converter', tip: 'Free rates, works offline', type: 'app' },
                    { name: 'World Time Buddy', url: 'https://www.worldtimebuddy.com', desc: 'Time zone converter', tip: 'Plan calls across time zones', type: 'web' },
                    { name: 'Wise', url: 'https://www.wise.com', desc: 'Multi-currency account & transfers', tip: 'Better exchange rates than banks', type: 'web' },
                    { name: 'Revolut', url: 'https://www.revolut.com', desc: 'Multi-currency card', tip: 'Spend abroad with no fees', type: 'app' },
                    { name: 'TripAdvisor', url: 'https://www.tripadvisor.com', desc: 'Reviews & recommendations', tip: 'Check reviews before booking', type: 'web' },
                    { name: 'Lonely Planet', url: 'https://www.lonelyplanet.com', desc: 'Travel guides & eBooks', tip: 'In-depth destination info', type: 'web' },
                    { name: 'Duolingo', url: 'https://www.duolingo.com', desc: 'Learn basic phrases', tip: 'Quick language basics before trip', type: 'app' },
                    { name: 'AllTrails', url: 'https://www.alltrails.com', desc: 'Hiking & trail maps', tip: 'Download trails offline', type: 'web' },
                    { name: 'Google Flights', url: 'https://www.google.com/travel/flights', desc: 'Flight search & deals', tip: 'Track prices for best timing', type: 'web' },
                    { name: 'Hostelworld', url: 'https://www.hostelworld.com', desc: 'Hostels & budget stays', tip: 'Best for backpackers', type: 'web' },
                    { name: 'Rome2Rio', url: 'https://www.rome2rio.com', desc: 'Multi-modal transport search', tip: 'Compare flights, trains, buses', type: 'web' }
                ];

                const cardsHtml = internationalApps.map(app => {
                    const logo = getAppLogo(app.name);
                    const badgeClass = app.type === 'app' ? 'badge-app' : 'badge-web';
                    return `
                    <a href="${app.url}" target="_blank" rel="noopener noreferrer" class="app-card">

                    </a>
                `;
                }).join('');

                return `
                <h3 class="section-title"><i class="fas fa-globe"></i> International apps (works worldwide)</h3>

            }

            // build country pills with flags and filter
            function renderCountryPills(filteredKeys = null) {
                const container = document.getElementById('countryPills');
                container.innerHTML = '';
                const keysToRender = filteredKeys || countryKeys;

                keysToRender.forEach(k => {
                    const c = countriesData[k];
                    if (!c) return;

                    // Check region filter
                    if (currentRegion !== 'all' && c.region !== currentRegion) return;

                    const pill = document.createElement('span');
                    pill.className = 'country-pill';
                    pill.setAttribute('data-key', k);
                    pill.setAttribute('role', 'option');
                    pill.setAttribute('tabindex', '0');
                    pill.innerHTML = `${c.flag} ${c.name}`;
                    pill.addEventListener('click', () => {
                        document.querySelectorAll('.country-pill').forEach(p => p.classList.remove('active'));
                        pill.classList.add('active');
                        renderCountry(k);
                    });
                    // Keyboard accessibility
                    pill.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            pill.click();
                        }
                    });
                    container.appendChild(pill);
                });

                // If no matches
                if (container.children.length === 0) {
                    container.innerHTML = '<span class="no-data">No countries found</span>';
                }
            }

            // Filter countries by search
            function filterCountries() {
                if (!searchQuery) {
                    renderCountryPills();
                    return;
                }
                const filtered = countryKeys.filter(k => {
                    const c = countriesData[k];
                    return c && c.name.toLowerCase().includes(searchQuery);
                });
                renderCountryPills(filtered);
            }

            // Update search to use filter
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                filterCountries();
            });

            // Initialize
            function init() {
                // Check for hash in URL or localStorage
                let initialCountry = null;

                // First check URL hash
                const hash = window.location.hash.slice(1);
                if (hash && countriesData[hash]) {
                    initialCountry = hash;
                }

                // Then check localStorage
                if (!initialCountry) {
                    try {
                        const saved = localStorage.getItem('lastCountry');
                        if (saved && countriesData[saved]) {
                            initialCountry = saved;
                        }
                    } catch (e) { }
                }

                // Default to first country
                if (!initialCountry) {
                    initialCountry = countryKeys[0];
                }

                // Render pills
                renderCountryPills();

                // Set active pill and render country
                setTimeout(() => {
                    const pill = document.querySelector(`[data-key="${initialCountry}"]`);
                    if (pill) {
                        pill.classList.add('active');
                    }
                    renderCountry(initialCountry);
                }, 0);
            }

            // Handle browser back/forward
            window.addEventListener('popstate', () => {
                const hash = window.location.hash.slice(1);
                if (hash && countriesData[hash]) {
                    document.querySelectorAll('.country-pill').forEach(p => p.classList.remove('active'));
                    const pill = document.querySelector(`[data-key="${hash}"]`);
                    if (pill) pill.classList.add('active');
                    renderCountry(hash);
                }
            });

            init();
        })();
    </script>
